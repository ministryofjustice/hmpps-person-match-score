name: SCA
run-name: Security Scanning ⚡️

on:
  schedule:
    - cron: "33 7 * * 1-5" # Every weekday
  workflow_dispatch:

permissions: {} # Top-level permissions set to none (explicit security)

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      actions: read

    steps:
      - name: SCA
        uses: ministryofjustice/devsecops-actions/sca@7dc13c20e2bf541b8a77fa1320a04983b18846f6 # v1.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          codeql-upload-findings: "always"
          docker-images-file: ${{ github.workspace }}/docker-images.json